version: "3.9"

services:
    app:
        build: .
        container_name: image-api-app
        env_file:
            - .env
        ports:
            - "8080:8080"
        volumes:
            - /volume1/images:/data/images

    nginx:
        image: nginx:alpine
        container_name: image-api-nginx
        depends_on:
            - app
        ports:
            - "8888:80"
        volumes:
            - /volume1/images:/data/images:ro
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
