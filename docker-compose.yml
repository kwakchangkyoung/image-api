services:
    app:
        build: .
        container_name: image-api-app
        env_file:
            - .env
        ports:
            - "${APP_PORT:-8080}:8080"
        volumes:
            - ${IMAGE_VOLUME:-./images}:${UPLOAD_DIR:-/data/images}

    nginx:
        image: nginx:alpine
        container_name: image-api-nginx
        depends_on:
            - app
        ports:
            - "${NGINX_PORT:-8888}:80"
        volumes:
            - ${IMAGE_VOLUME:-./images}:${UPLOAD_DIR:-/data/images}:ro
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
